<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css"/>
</head>

<body>
    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            PULSEDESK
        </div>
        <span class="header-tag">COMMENT TRIAGE SYSTEM</span>
    </header>

    <main>
        <div class="panel submit-panel">
            <div class="panel-header">
                <span class="panel-title">Submit Comment</span>
            </div>
            <div class="panel-body">
                <textarea id="commentInput" placeholder="Describe your issue or leave feedback..."></textarea>
                <div class="status-msg" id="statusMsg"></div>
                <button class="submit-btn" id="submitBtn" onclick="submitComment()">
                    <div class="spinner" id="spinner"></div>
                    <span id="submitLabel">SUBMIT</span>
                </button>
            </div>
        </div>

        <div class="panel" style="grid-column: 2; grid-row: 1 / 3;">
            <div class="panel-header">
                <span class="panel-title">Tickets</span>
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <span class="panel-count" id="ticketCount">—</span>
                    <button class="refresh-btn" onclick="loadTickets()">REFRESH</button>
                </div>
            </div>
            <div class="panel-body" id="ticketList">
                <div class="empty">NO TICKETS YET</div>
            </div>
        </div>

        <div class="panel" style="grid-column: 1;">
            <div class="panel-header">
                <span class="panel-title">Comments</span>
                <span class="panel-count" id="commentCount">—</span>
            </div>
            <div class="panel-body" id="commentList">
                <div class="empty">NO COMMENTS YET</div>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
